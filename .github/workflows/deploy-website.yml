# Evidoc Marketing Website — Build & Deploy to Azure Static Web Apps
#
# Deploys the Astro site at frontend/website/ to Azure Static Web Apps.
# Triggers on changes to website files on main branch.
#
# Required GitHub secret:
#   AZURE_STATIC_WEB_APPS_API_TOKEN — deployment token from Azure portal
#     (Azure Portal → Static Web App → Manage deployment token)

name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'frontend/website/**'
      - '.github/workflows/deploy-website.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/website/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/website/package-lock.json

      - name: Install dependencies
        working-directory: frontend/website
        run: npm ci

      - name: Build Astro site
        working-directory: frontend/website
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        if: github.event_name != 'pull_request'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/website
          output_location: dist
          skip_app_build: true  # Already built above

      - name: Close PR staging environment
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
